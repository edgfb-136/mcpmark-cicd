name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
      package_version: ${{ steps.package-version.outputs.version }}
      previous_commit: ${{ github.event.before }}
      current_commit: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get package version
        id: package-version
        run: |
          if [ -f package.json ]; then
            echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
          else
            echo "version=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create deployment label if not exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'deployment'
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'deployment',
                  color: '0052cc',
                  description: 'Deployment related issues'
                });
              } else {
                throw error;
              }
            }

      - name: Create in-progress label if not exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'in-progress'
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'in-progress',
                  color: 'fbca04',
                  description: 'Work in progress'
                });
              } else {
                throw error;
              }
            }

      - name: Create completed label if not exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'completed'
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'completed',
                  color: '28a745',
                  description: 'Work completed'
                });
              } else {
                throw error;
              }
            }

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `Previous Commit: ${context.event.before}\nPackage Version: ${{ steps.package-version.outputs.version }}`
            });
            return issue.data.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.result }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create-artifact.outputs.artifact_name }}
      sha256_checksum: ${{ steps.generate-checksum.outputs.sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create rollback directory
        run: mkdir -p rollback-artifacts/backups

      - name: Create rollback script
        run: |
          cat > rollback-artifacts/rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback script for Node.js deployment
          PREVIOUS_COMMIT="${{ needs.pre-deployment.outputs.previous_commit }}"
          CURRENT_COMMIT="${{ needs.pre-deployment.outputs.current_commit }}"

          echo "=== Starting Rollback from $CURRENT_COMMIT to $PREVIOUS_COMMIT ==="

          # Verify git repository
          if ! git rev-parse --is-inside-work-tree > /dev/null 2>&1; then
            echo "Error: Not in a git repository"
            exit 1
          fi

          # Fetch all commits
          git fetch --all

          # Checkout previous commit
          echo "Checking out previous commit: $PREVIOUS_COMMIT"
          git checkout $PREVIOUS_COMMIT

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm ci

          echo "=== Rollback completed successfully to $PREVIOUS_COMMIT ==="
          EOF
          chmod +x rollback-artifacts/rollback.sh

      - name: Create configuration backups
        run: |
          cp package.json rollback-artifacts/backups/
          cp package-lock.json rollback-artifacts/backups/
          # Create environment template backup (if exists)
          if [ -f .env.example ]; then
            cp .env.example rollback-artifacts/backups/
          fi

      - name: Create dependency verification script
        run: |
          cat > rollback-artifacts/verify-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Verifying Dependency Compatibility ==="

          # Check if package-lock.json exists
          if [ ! -f package-lock.json ]; then
            echo "Error: package-lock.json not found"
            exit 1
          fi

          # Verify dependency integrity
          npm ci --dry-run
          echo "✅ Dependencies are compatible with previous commit"

          # Check Node.js version compatibility
          REQUIRED_NODE_VERSION=$(jq -r '.engines.node' package.json 2>/dev/null || echo ">=18.0.0")
          echo "Required Node.js version: $REQUIRED_NODE_VERSION"
          if node -v | grep -qE "$REQUIRED_NODE_VERSION"; then
            echo "✅ Node.js version is compatible"
          else
            echo "⚠️ Node.js version may not be compatible"
          fi
          EOF
          chmod +x rollback-artifacts/verify-deps.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-artifacts/README-rollback.md << 'EOF'
          # Rollback Instructions for Deployment ${{ needs.pre-deployment.outputs.current_commit }}

          ## Overview
          This document provides step-by-step instructions to rollback to the previous commit (${{ needs.pre-deployment.outputs.previous_commit }}).

          ## Prerequisites
          - Git installed
          - Node.js ${{ needs.pre-deployment.outputs.package_version }} compatible version installed
          - npm installed

          ## Rollback Steps
          1. Navigate to the project directory
          2. Make sure you're on the main branch: `git checkout main`
          3. Run the rollback script: `./rollback.sh`
          4. Verify the rollback: `npm run test`
          5. Restart the application (if needed)

          ## Rollback Artifacts
          - rollback.sh: Automated rollback script
          - backups/: Configuration backups (package.json, package-lock.json, .env.example)
          - verify-deps.sh: Dependency compatibility checker
          - This README file

          ## Support
          If you encounter issues during rollback, contact the DevOps team.
          EOF

      - name: Create compressed rollback package
        id: create-artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current_commit }}"
          tar -czf "$ARTIFACT_NAME.tar.gz" rollback-artifacts/
          echo "artifact_name=$ARTIFACT_NAME.tar.gz" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate-checksum
        run: |
          SHA256=$(sha256sum ${{ steps.create-artifact.outputs.artifact_name }} | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "$SHA256  ${{ steps.create-artifact.outputs.artifact_name }}" > ${{ steps.create-artifact.outputs.artifact_name }}.sha256

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifact.outputs.artifact_name }}
          path: |
            ${{ steps.create-artifact.outputs.artifact_name }}
            ${{ steps.create-artifact.outputs.artifact_name }}.sha256
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `# 🔄 Rollback Plan Ready

              Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}
              Package Version: ${{ needs.pre-deployment.outputs.package_version }}
              Artifact: ${{ steps.create-artifact.outputs.artifact_name }}

              ✅ Rollback script created
              ✅ Configuration backups completed
              ✅ Dependency verification script created
              ✅ Rollback documentation generated
              ✅ Compressed rollback package created

              ## Quick Rollback Command
              \`\`\`bash
              # Download and extract the rollback package
              wget ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.create-artifact.outputs.artifact_name }}
              tar -xzf ${{ steps.create-artifact.outputs.artifact_name }}
              cd rollback-artifacts
              chmod +x rollback.sh
              ./rollback.sh
              \`\`\`

              Rollback script created: true
              Configuration backup: true
              SHA256: ${{ steps.generate-checksum.outputs.sha256 }}`
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update deployment issue labels
        uses: actions/github-script@v7
        with:
          script: |
            # Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            # Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `# Deployment Completed Successfully

              The deployment to main branch has been completed successfully.

              ## Rollback Information
              - Rollback Artifact: ${{ needs.rollback-preparation.outputs.artifact_name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.sha256_checksum }}
              - Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}

              You can download the rollback package from the [artifacts section](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) of this workflow run.`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });